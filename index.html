<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивная 3D Платформа</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0a0c10;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Контейнер для 3D сцены */
        #canvas-container {
            width: 100%;
            height: 100vh; /* Растягиваем на весь экран, чтобы было красиво */
            position: relative;
            overflow: hidden;
        }

        /* Слой для HTML-табличек поверх 3D холста */
        .labels-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Клик сквозь слой, чтобы можно было крутить модель */
            z-index: 10;
        }

        /* Сама табличка (точка + карточка) */
        .part-label {
            position: absolute;
            display: flex;
            align-items: center;
            transform: translate(-15px, -15px); /* Центрируем точку */
            transition: opacity 0.2s ease;
            pointer-events: auto; /* А на саму карточку нажимать можно */
        }

        /* Светящаяся точка на детали */
        .label-dot {
            width: 16px;
            height: 16px;
            background-color: #00ffcc;
            border-radius: 50%;
            border: 3px solid #ffffff;
            box-shadow: 0 0 15px #00ffcc;
            cursor: pointer;
            flex-shrink: 0;
            transition: transform 0.2s ease;
        }

        .part-label:hover .label-dot {
            transform: scale(1.3);
            background-color: #ff0055;
            box-shadow: 0 0 15px #ff0055;
        }

        /* Всплывающая карточка с текстом */
        .label-card {
            background: rgba(15, 22, 36, 0.9);
            border: 1px solid rgba(0, 255, 204, 0.3);
            padding: 12px 16px;
            border-radius: 8px;
            margin-left: 15px;
            width: 220px;
            backdrop-filter: blur(5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            opacity: 0;
            transform: translateX(-10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        /* Показываем карточку при наведении на точку или саму карточку */
        .part-label:hover .label-card {
            opacity: 1;
            transform: translateX(0);
        }

        .label-card h3 {
            font-size: 14px;
            color: #00ffcc;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .label-card p {
            font-size: 12px;
            color: #a0aec0;
            line-height: 1.4;
        }

        /* Ползунок управления взрывом (внизу экрана) */
        .controls-panel {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 22, 36, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 30px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 20px;
            backdrop-filter: blur(10px);
            z-index: 100;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .controls-panel label {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            color: #00ffcc;
        }

        .controls-panel input[type="range"] {
            width: 250px;
            accent-color: #00ffcc;
            cursor: pointer;
        }
    </style>

    /* Подключаем библиотеки Three.js и OrbitControls для вращения камеры */
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="canvas-container">
        <div class="labels-overlay" id="labels-container"></div>
        
        <div class="controls-panel">
            <label for="explodeSlider">РАЗБОРКА ПЛАТФОРМЫ</label>
            <input type="range" id="explodeSlider" min="0" max="1" step="0.01" value="0">
        </div>
    </div>

    <script>
        // Глобальные переменные Three.js
        let scene, camera, renderer, controls;
        let robotModel = null;
        let activeLabels = []; // Тут хранятся связи деталей и табличек

        const container = document.getElementById('canvas-container');
        const labelsContainer = document.getElementById('labels-container');
        const explodeSlider = document.getElementById('explodeSlider');

        // Инициализация сцены
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0c10);

            // Камера
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
            camera.position.set(0, 2, 5);

            // Рендерер
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            // Управление камерой (крутить мышем)
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 + 0.1; // Не даем камере уходить под пол

            // Освещение сцены
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight1 = new THREE.DirectionalLight(0x00ffcc, 0.8);
            dirLight1.position.set(5, 10, 7);
            scene.add(dirLight1);

            const dirLight2 = new THREE.DirectionalLight(0xff0055, 0.5);
            dirLight2.position.set(-5, 5, -5);
            scene.add(dirLight2);

            // Загрузка 3D модели робота
            const loader = new THREE.GLTFLoader();
            loader.load('tank_nrtk.glb', function (gltf) {
                robotModel = gltf.scene;
                scene.add(robotModel);

                // Автоматически центрируем модель в пространстве
                const box = new THREE.Box3().setFromObject(robotModel);
                const center = box.getCenter(new THREE.Vector3());
                robotModel.position.sub(center);

                // Перебираем детали робота
                robotModel.traverse((child) => {
                    if (child.isMesh) {
                        // Запоминаем стартовую позицию для взрыва
                        child.userData.originalPosition = child.position.clone();
                        
                        // Считаем вектор разлета (от центра робота наружу)
                        const worldPosition = new THREE.Vector3();
                        child.getWorldPosition(worldPosition);
                        child.userData.explosionDirection = worldPosition.clone().normalize();

                        // --- АВТОМАТИЧЕСКАЯ НАСТРОЙКА ТАБЛИЧЕК ---
                        const rawName = child.name || '';
                        
                        // Проверяем, что имя нормальное, а не технический мусор
                        const isTechnical = rawName.toLowerCase().includes('cube') || 
                                            rawName.toLowerCase().includes('plane') || 
                                            rawName.toLowerCase().includes('mesh') ||
                                            rawName.toLowerCase().includes('amateur');

                        if (rawName.length > 2 && !isTechnical) {
                            // Очищаем имя от всяких суффиксов вроде _01 или .002
                            let cleanName = rawName.split(/[_\.]/)[0]; 
                            cleanName = cleanName.charAt(0).toUpperCase() + cleanName.slice(1);

                            // Создаем HTML-табличку в слое над холстом
                            const label = document.createElement('div');
                            label.className = 'part-label';
                            label.innerHTML = `
                                <div class="label-dot"></div>
                                <div class="label-card">
                                    <h3>${cleanName}</h3>
                                    <p>Информационный блок компонента платформы.</p>
                                </div>
                            `;
                            labelsContainer.appendChild(label);

                            // Связываем 3D-меш и 2D-табличку вместе
                            activeLabels.push({
                                mesh: child,
                                labelDOM: label
                            });
                        }
                    }
                });

                animate();
            }, undefined, function (error) {
                console.error('Ошибка загрузки модели tank_nrtk.glb:', error);
            });

            // Слушатель изменения размера окна
            window.addEventListener('resize', onWindowResize);
        }

        // Обновление позиций табличек на экране (перевод 3D координат в 2D)
        function updateLabelsPositions() {
            if (!robotModel) return;

            const tempV = new THREE.Vector3();

            activeLabels.forEach((part) => {
                // Получаем мировую 3D-позицию детали
                part.mesh.getWorldPosition(tempV);

                // Проецируем 3D координаты на 2D экран камеры
                tempV.project(camera);

                // Если деталь оказалась за камерой, прячем табличку
                if (tempV.z > 1) {
                    part.labelDOM.style.display = 'none';
                    return;
                } else {
                    part.labelDOM.style.display = 'flex';
                }

                // Переводим проекцию (-1 до 1) в пиксели экрана
                const x = (tempV.x * .5 + .5) * container.clientWidth;
                const y = (tempV.y * -.5 + .5) * container.clientHeight;

                // Двигаем HTML-элемент таблички
                part.labelDOM.style.left = `${x}px`;
                part.labelDOM.style.top = `${y}px`;
            });
        }

        // Логика взрыва (разлета деталей) по ползунку
        function updateExplosion() {
            if (!robotModel) return;
            
            const factor = parseFloat(explodeSlider.value) * 1.5; // Сила разлета

            robotModel.traverse((child) => {
                if (child.isMesh && child.userData.originalPosition && child.userData.explosionDirection) {
                    // Считаем смещение: оригинальная позиция + (направление * коэффициент ползунка)
                    const offset = child.userData.explosionDirection.clone().multiplyScalar(factor);
                    child.position.copy(child.userData.originalPosition).add(offset);
                }
            });
        }

        // Обработчик ползунка разборки
        explodeSlider.addEventListener('input', updateExplosion);

        // Функция рендера и обновления кадров
        function animate() {
            requestAnimationFrame(animate);

            // Обновляем физику мыши камеры
            controls.update();

            // Пересчитываем координаты табличек на каждом кадре, чтобы они не отставали
            updateLabelsPositions();

            // Рисуем сцену
            renderer.render(scene, camera);
        }

        // Корректное масштабирование при изменении размеров окна браузера
        function onWindowResize() {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        // Запуск
        init();
    </script>
</body>
</html>
