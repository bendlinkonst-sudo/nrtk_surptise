<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>НТРК "СЮРПРИЗ"</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        /* ТВОЯ РОДНАЯ ШАПКА */
        header {
            background-image: url('123123.jpg');
            background-size: cover;
            background-position: center;
            height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }

        h1 {
            font-size: 3em;
            margin: 0;
        }

        /* КОНТЕЙНЕР ДЛЯ ТАНКА */
        #canvas-container {
            width: 100%;
            height: 500px;
            background-color: #111;
            position: relative;
        }

        /* ИНДИКАТОР ЗАГРУЗКИ */
        #loader-info {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #00f2ff;
            z-index: 10;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>НТРК "СЮРПРИЗ"</h1>
        <p>Добро пожаловать в будущее</p>
    </header>

    <div id="canvas-container">
        <div id="loader-info">Подключение к системам...</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const container = document.getElementById('canvas-container');
        const info = document.getElementById('loader-info');
        
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 5, 5);
        scene.add(light);

        const loader = new GLTFLoader();
        
        // ПУТЬ К МОДЕЛИ
        loader.load('./tank_nrtk.glb', (gltf) => {
            const model = gltf.scene;
            scene.add(model);
            
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            model.position.sub(center);
            
            camera.position.z = Math.max(size.x, size.y, size.z) * 1.5;
            info.style.display = 'none';

            const controls = new OrbitControls(camera, renderer.domElement);
            
            function animate() {
                requestAnimationFrame(animate);
                model.rotation.y += 0.005;
                renderer.render(scene, camera);
            }
            animate();
        }, 
        (xhr) => {
            const p = Math.round(xhr.loaded / xhr.total * 100);
            info.innerText = `Загрузка танка: ${p}%`;
        },
        (err) => {
            info.innerText = "Ошибка! Проверь имя файла .glb";
            console.error(err);
        });
    </script>
</body>
</html>
