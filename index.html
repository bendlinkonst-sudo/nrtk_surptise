<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>НРТК СЮРПРИЗ | Инженерный разбор</title>
    
    <script>
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>

    <style>
        :root {
            --neon-blue: #00f2ff;    
            --dark-blue: #0077ff;    
            --bg-overlay: radial-gradient(circle, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.9) 100%); 
        }

        body {
            background-color: #0a0a0a;
            background-image: url('background.jpg'); 
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            background-size: cover;
            margin: 0;
            padding: 0;
            font-family: 'Verdana', sans-serif;
            color: var(--neon-blue);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-overlay);
            z-index: -1;
        }

        .cyber-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid rgba(0, 242, 255, 0.3);
            box-sizing: border-box;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-area { display: flex; align-items: center; text-decoration: none; gap: 20px; }
        .logo-img { height: 70px; filter: drop-shadow(0 0 10px var(--neon-blue)); }
        .brand-name { font-size: 38px; font-weight: 900; color: #fff; text-transform: uppercase; text-shadow: 0 0 15px var(--dark-blue); margin: 0; }

        .header-nav { display: flex; align-items: center; gap: 30px; }
        .nav-link { color: #fff; text-decoration: none; font-size: 14px; font-weight: bold; transition: 0.3s; text-transform: uppercase; }
        .nav-link:hover { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }

        #canvas-container {
            width: 100%;
            height: 600px; 
            margin-top: 20px;
            position: relative;
        }

        #explode-btn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            border: 2px solid var(--neon-blue);
            padding: 12px 35px;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
            transition: all 0.3s ease;
            z-index: 100;
        }

        #explode-btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 25px var(--neon-blue);
        }

        #loader-status {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: monospace;
            text-shadow: 0 0 10px var(--neon-blue);
            z-index: 10;
        }

        /* СТИЛИЗАЦИЯ ИНЖЕНЕРНЫХ РАМОЧЕК С НАЗВАНИЕМ */
        .tech-label-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            opacity: 0; /* Изначально скрыты */
            transition: opacity 0.5s ease-in-out;
        }

        .tech-label-container.visible {
            opacity: 1;
        }

        /* Сама неоновая рамочка */
        .tech-card {
            background: rgba(0, 10, 20, 0.85);
            border: 1px solid var(--neon-blue);
            padding: 6px 12px;
            border-radius: 3px;
            color: #ffffff;
            font-family: monospace;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            white-space: nowrap;
            letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.3), inset 0 0 5px rgba(0, 242, 255, 0.2);
        }

        /* Стрелочка-линия, идущая вниз к детали */
        .tech-pointer {
            width: 2px;
            height: 40px; /* Длина стрелочки */
            background: linear-gradient(to bottom, var(--neon-blue), rgba(0, 242, 255, 0));
            box-shadow: 0 0 5px var(--neon-blue);
        }

        /* Точка соприкосновения с деталью */
        .tech-dot {
            width: 4px;
            height: 4px;
            background: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 8px #ffffff, 0 0 15px var(--neon-blue);
        }
    </style>
</head>
<body>

    <header class="cyber-header">
        <a href="index.html" class="logo-area">
            <img src="logo-clean.png" alt="НРТК" class="logo-img">
            <div class="logo-text-block">
                <h1 class="brand-name">СЮРПРИЗ</h1>
            </div>
        </a>
        <nav class="header-nav">
            <a href="index.html" class="nav-link">ГЛАВНАЯ</a>
            <a href="shop.html" class="nav-link">КАТАЛОГ</a>
            <a href="#" onclick="logout()" class="nav-link" style="color: #ff4444;">ВЫХОД</a>
        </nav>
    </header>

    <div id="canvas-container">
        <div id="loader-status">СКАНИРОВАНИЕ СИСТЕМ...</div>
        <button id="explode-btn" style="display: none;">Детализация прототипа</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        // Подключаем специальный рендерер текстовых слоев поверх WebGL
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        const container = document.getElementById('canvas-container');
        const loaderStatus = document.getElementById('loader-status');
        const explodeBtn = document.getElementById('explode-btn');
        
        const scene = new THREE.Scene();
        
        // Основной WebGL камера и рендерер
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 4, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        container.appendChild(renderer.domElement);

        // Инициализируем 2D-рендерер для HTML-рамочек
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(container.clientWidth, container.clientHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none'; // Чтобы не мешал крутить мышку
        container.appendChild(labelRenderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        let isExploded = false;
        const parts = []; 
        const labelElements = []; // Хранилище для управления видимостью рамок
        let robotModel = null;
        const loader = new GLTFLoader();

        // Словарь красивых имен (если в имени файла есть ключ, покажем красивый текст)
        const nameMapping = {
            'body': 'Основное шасси / Рама',
            'skelet': 'Основное шасси / Рама',
            'rama': 'Основное шасси / Рама',
            'chassis': 'Основное шасси / Рама',
            'bonnet': 'Защитный капот ДВС',
            'transport_module': 'Грузовой отсек',
            'wheel': 'Ведущее колесо',
            'track': 'Гусеничная лента',
            'motor': 'Электропривод',
            'sensor': 'Модуль навигации'
        };

        loader.load('./tank_nrtk.glb', (gltf) => {
            robotModel = gltf.scene;
            
            const box = new THREE.Box3().setFromObject(robotModel);
            const center = box.getCenter(new THREE.Vector3());
            robotModel.position.sub(center);
            scene.add(robotModel);

            robotModel.traverse((child) => {
                if (child.isMesh) {
                    const nameLower = child.name ? child.name.toLowerCase() : '';
                    let explodeVec = new THREE.Vector3();
                    let isMainPart = false;
                    let customTitle = '';

                    // Проверяем, заслуживает ли деталь отдельной рамочки
                    for (const [key, value] of Object.entries(nameMapping)) {
                        if (nameLower.includes(key)) {
                            isMainPart = true;
                            customTitle = value;
                            break;
                        }
                    }

                    // 1. НАСТРОЙКА РАЗЛЕТА
                    if (nameLower.includes('body') || nameLower.includes('skelet') || nameLower.includes('rama') || nameLower.includes('chassis') || nameLower.includes('base')) {
                        explodeVec.set(0, 0, 0); 
                    } else if (nameLower.includes('bonnet')) {
                        explodeVec.set(0, 0.6, 0.8); 
                    } else if (nameLower.includes('transport_module')) {
                        explodeVec.set(0, 0.6, -0.8); 
                    } else {
                        const worldPos = new THREE.Vector3();
                        child.getWorldPosition(worldPos);
                        explodeVec = worldPos.clone().normalize();

                        if (explodeVec.length() === 0 || (Math.abs(explodeVec.x) < 0.1 && Math.abs(explodeVec.z) < 0.1)) {
                            explodeVec.set((Math.random() - 0.5) * 2, 0.2, (Math.random() - 0.5) * 2).normalize();
                        }
                        explodeVec.multiplyScalar(0.6);
                        explodeVec.y += 0.15;
                    }

                    // 2. СОЗДАНИЕ НЕОНОВОЙ ВЫНОСКИ (РАМОЧКА С СТРЕЛОЧКОЙ)
                    if (isMainPart) {
                        // Создаем структуру HTML-элемента выноски
                        const containerDiv = document.createElement('div');
                        containerDiv.className = 'tech-label-container';

                        const cardDiv = document.createElement('div');
                        cardDiv.className = 'tech-card';
                        cardDiv.innerText = customTitle || child.name; // Имя из словаря или оригинальное

                        const pointerDiv = document.createElement('div');
                        pointerDiv.className = 'tech-pointer';

                        const dotDiv = document.createElement('div');
                        dotDiv.className = 'tech-dot';

                        // Собираем выноску: Карта -> Стрелка -> Точка
                        containerDiv.appendChild(cardDiv);
                        containerDiv.appendChild(pointerDiv);
                        containerDiv.appendChild(dotDiv);

                        // Оборачиваем HTML в объект Three.js и крепим прямо к мешу
                        const cssLabel = new CSS2DObject(containerDiv);
                        // Позиционируем рамку чуть выше центра детали
                        cssLabel.position.set(0, 0.2, 0); 
                        child.add(cssLabel);

                        labelElements.push(containerDiv);
                    }

                    parts.push({
                        mesh: child,
                        originalPos: child.position.clone(),
                        explodeVec: explodeVec
                    });
                }
            });

            loaderStatus.style.display = 'none';
            explodeBtn.style.display = 'block';

            explodeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                isExploded = !isExploded;
                explodeBtn.innerText = isExploded ? "Сборка модулей" : "Детализация прототипа";

                // Управление появлением рамочек
                labelElements.forEach(el => {
                    if (isExploded) {
                        // Показываем рамочки с легкой задержкой, пока детали разлетаются
                        setTimeout(() => { el.classList.add('visible'); }, 300);
                    } else {
                        // При сборке мгновенно тушим рамки, чтобы не засорять экран
                        el.classList.remove('visible');
                    }
                });
            });

            function animate() {
                requestAnimationFrame(animate);
                
                parts.forEach(part => {
                    const target = isExploded 
                        ? part.originalPos.clone().add(part.explodeVec) 
                        : part.originalPos;
                    
                    part.mesh.position.lerp(target, 0.08); 
                });

                if (!isExploded && robotModel) {
                    robotModel.rotation.y += 0.003;
                }
                
                controls.update();
                renderer.render(scene, camera);
                labelRenderer.render(scene, camera); // Рендерим текстовый слой поверх 3D
            }
            animate();

        }, (xhr) => {
            const p = Math.round(xhr.loaded / xhr.total * 100);
            loaderStatus.innerText = `ЗАГРУЗКА ДАННЫХ: ${p}%`;
        });

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
            labelRenderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>

    <script>
        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
