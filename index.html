<!DOCTYPE html>
<html lang="ru">
<head>
    <script>
    // Проверка авторизации: если в памяти браузера нет отметки 'isLoggedIn', 
    // система выбрасывает пользователя на страницу входа.
    if (localStorage.getItem('isLoggedIn') !== 'true') {
        window.location.href = 'login.html';
    }
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>НРТК СЮРПРИЗ | Главная</title>
    <style>
        :root {
            --neon-blue: #00f2ff;    
            --neon-pink: #ff00ff;    
            --status-green: #39ff14; 
            --bg-overlay: radial-gradient(circle, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.9) 100%); 
        }

        body {
            background-color: #0a0a0a;
            background-image: url('background.jpg'); 
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            background-size: cover;
            margin: 0;
            padding: 0;
            font-family: 'Verdana', sans-serif;
            color: var(--neon-blue);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* УЛУЧШЕННЫЙ ФОНОВЫЙ СЛОЙ */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-overlay);
            z-index: -1;
        }

        /* --- ЭТАЛОННАЯ ШАПКА --- */
        .cyber-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            /* Эффект матового стекла */
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 242, 255, 0.3);
            box-sizing: border-box;
            position: sticky;
            top: 0;
            z-index: 1000;
            overflow: hidden;
        }

        /* УСИЛЕННАЯ НЕОНОВАЯ ПОЛОСКА */
        .cyber-header::after {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-pink), transparent);
            animation: scan 3s linear infinite; /* Чуть ускорил для динамики */
            filter: blur(1px);
        }

        @keyframes scan {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .logo-area { display: flex; align-items: center; text-decoration: none; color: inherit; }
        .logo-icon { 
            font-size: 32px; 
            margin-right: 15px; 
            filter: drop-shadow(0 0 10px var(--neon-blue)); 
        }

        .tech-font {
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 8px rgba(0, 242, 255, 0.6);
        }

        .status-online {
            display: block;
            font-size: 9px;
            color: var(--status-green);
            text-shadow: 0 0 10px var(--status-green);
            letter-spacing: 1px;
            margin-top: 2px;
        }

        /* --- НАВИГАЦИЯ --- */
        .header-nav { display: flex; align-items: center; }

        .nav-link {
            color: var(--neon-blue);
            text-decoration: none;
            margin: 0 18px;
            font-size: 12px;
            transition: all 0.3s ease;
            opacity: 0.8;
        }

        .nav-link:hover {
            color: var(--neon-pink);
            text-shadow: 0 0 15px var(--neon-pink);
            opacity: 1;
            transform: translateY(-1px);
        }

        .cart-btn {
            font-size: 22px;
            text-decoration: none;
            margin-right: 25px;
            transition: 0.3s;
            filter: drop-shadow(0 0 5px var(--neon-blue));
        }

        .cart-btn:hover { 
            transform: scale(1.2) rotate(-10deg); 
            filter: drop-shadow(0 0 12px var(--neon-pink)); 
        }

        .login-btn {
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 10px 25px;
            text-decoration: none;
            transition: all 0.4s ease;
            clip-path: polygon(15% 0, 100% 0, 85% 100%, 0 100%);
            background: rgba(0, 242, 255, 0.05);
        }

        .login-btn:hover {
            background: var(--neon-blue);
            box-shadow: 0 0 25px var(--neon-blue);
            color: #000;
            font-weight: bold;
        }

        /* --- ГЛАВНЫЙ КОНТЕНТ --- */
        .hero-section {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
        }

        .hero-title {
            font-size: clamp(32px, 8vw, 56px); /* Адаптивный размер шрифта */
            color: #ffffff;
            margin: 0 0 25px 0;
            text-shadow: 0 0 30px rgba(0, 242, 255, 0.8);
        }

        .hero-text {
            font-size: 19px;
            max-width: 750px;
            line-height: 1.8;
            margin-bottom: 50px;
            color: rgba(0, 242, 255, 0.9);
            font-weight: 300;
        }

        .hero-btn {
            display: inline-block;
            padding: 20px 60px;
            color: #fff;
            text-decoration: none;
            border: 2px solid var(--neon-pink);
            background: rgba(255, 0, 255, 0.05);
            font-size: 18px;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }

        .hero-btn:hover {
            background: var(--neon-pink);
            color: #000;
            box-shadow: 0 0 50px var(--neon-pink);
            transform: scale(1.1);
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <header class="cyber-header">
        <a href="index.html" class="logo-area">
            <div class="logo-icon">⚙️</div>
            <div class="logo-text">
                <span class="tech-font" style="font-size: 24px;">НРТК СЮРПРИЗ</span>
                <span class="status-online">● СИСТЕМА_АКТИВНА</span>
            </div>
        </a>
        
        <nav class="header-nav">
            <a href="index.html" class="nav-link tech-font">ГЛАВНАЯ</a>
            <a href="shop.html" class="nav-link tech-font">МАГАЗИН</a>
            <a href="account.html" class="nav-link tech-font">МОЙ АККАУНТ</a>
            <a href="cart.html" class="cart-btn">🛒</a>
            <a href="login.html" class="login-btn tech-font">ВЫХОД</a>
        </nav>
    </header>

    <main class="hero-section">
        <h1 class="hero-title tech-font">БУДУЩЕЕ РОБОТОТЕХНИКИ ЗДЕСЬ</h1>
        <p class="hero-text">
            Добро пожаловать в мир, где Вы познакомитесь с НРТК "СЮРПРИЗ".<br>
            Мы создаем модули, которые меняют правила игры.
        </p>
        <a href="shop.html" class="hero-btn tech-font">ПЕРЕЙТИ В КАТАЛОГ</a>
    </main>

</body>
</html>
