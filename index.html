<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>НРТК СЮРПРИЗ | Инженерный разбор</title>
    
    <script>
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>

    <style>
        :root {
            --neon-blue: #00f2ff;    
            --dark-blue: #0077ff;    
            --bg-overlay: radial-gradient(circle, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.9) 100%); 
        }

        body {
            background-color: #0a0a0a;
            background-image: url('background.jpg'); 
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            background-size: cover;
            margin: 0;
            padding: 0;
            font-family: 'Verdana', sans-serif;
            color: var(--neon-blue);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-overlay);
            z-index: -1;
        }

        .cyber-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid rgba(0, 242, 255, 0.3);
            box-sizing: border-box;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-area { display: flex; align-items: center; text-decoration: none; gap: 20px; }
        .logo-img { height: 70px; filter: drop-shadow(0 0 10px var(--neon-blue)); }
        .brand-name { font-size: 38px; font-weight: 900; color: #fff; text-transform: uppercase; text-shadow: 0 0 15px var(--dark-blue); margin: 0; }

        .header-nav { display: flex; align-items: center; gap: 30px; }
        .nav-link { color: #fff; text-decoration: none; font-size: 14px; font-weight: bold; transition: 0.3s; text-transform: uppercase; }
        .nav-link:hover { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }

        #canvas-container {
            width: 100%;
            height: 600px; 
            margin-top: 20px;
            position: relative;
            cursor: pointer;
        }

        #hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border: 1px solid var(--neon-blue);
            border-radius: 20px;
            font-size: 12px;
            pointer-events: none;
            animation: pulse 2s infinite;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        #loader-status {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: monospace;
            text-shadow: 0 0 10px var(--neon-blue);
        }
    </style>
</head>
<body>

    <header class="cyber-header">
        <a href="index.html" class="logo-area">
            <img src="logo-clean.png" alt="НРТК" class="logo-img">
            <div class="logo-text-block">
                <h1 class="brand-name">СЮРПРИЗ</h1>
            </div>
        </a>
        <nav class="header-nav">
            <a href="index.html" class="nav-link">ГЛАВНАЯ</a>
            <a href="shop.html" class="nav-link">КАТАЛОГ</a>
            <a href="#" onclick="logout()" class="nav-link" style="color: #ff4444;">ВЫХОД</a>
        </nav>
    </header>

    <div id="canvas-container">
        <div id="loader-status">СКАНИРОВАНИЕ СИСТЕМ...</div>
        <div id="hint">КЛИКНИТЕ ДЛЯ ДЕТАЛИЗАЦИИ</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const container = document.getElementById('canvas-container');
        const loaderStatus = document.getElementById('loader-status');
        const hint = document.getElementById('hint');
        
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 4, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        container.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        let isExploded = false;
        const parts = []; 
        const loader = new GLTFLoader();

        loader.load('./tank_nrtk.glb', (gltf) => {
            const model = gltf.scene;
            
            // Центрируем общую модель
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center);
            scene.add(model);

            model.traverse((child) => {
                if (child.isMesh) {
                    const name = child.name;
                    let explodeVec = new THREE.Vector3(0, 0, 0); // По умолчанию деталь стоит

                    // 1. Внутренняя начинка выходит наверх
                    if (name.includes('Driver') || name.includes('Motor_') || name.includes('Battery') || name.includes('Electronics')) {
                        explodeVec.set(0, 1.2, 0); // Сдвиг строго вверх
                    }
                    // 2. Камера и антенна поднимаются еще выше
                    else if (name.includes('Camera') || name.includes('antenna')) {
                        explodeVec.set(0, 2.0, 0); // Выше всей начинки
                    }
                    // 3. Капот открывается вперед и вверх
                    else if (name.includes('Bonnet')) {
                        explodeVec.set(0, 0.6, 1.0); 
                    }
                    // 4. Транспортный модуль отходит назад
                    else if (name.includes('transport_module')) {
                        explodeVec.set(0, 0, -1.2);
                    }
                    // 5. Левая сторона отходит влево
                    else if (name.includes('_left')) {
                        explodeVec.set(-1.2, 0, 0);
                    }
                    // 6. Правая сторона отходит вправо
                    else if (name.includes('_right')) {
                        explodeVec.set(1.2, 0, 0);
                    }
                    // 7. Обработка множества колес (roller_wheel)
                    else if (name.includes('roller_wheel')) {
                        // Если колесо изначально находится слева от центра — двигаем влево, иначе вправо
                        // Для этого смотрим на мировое или локальное положение (определим по знаку X)
                        if (child.position.x < 0) {
                            explodeVec.set(-1.2, 0, 0);
                        } else {
                            explodeVec.set(1.2, 0, 0);
                        }
                    }
                    // Body и skelet остаются на месте (explodeVec = 0,0,0)

                    parts.push({
                        mesh: child,
                        originalPos: child.position.clone(),
                        explodeVec: explodeVec
                    });
                }
            });

            loaderStatus.style.display = 'none';

            container.addEventListener('click', () => {
                isExploded = !isExploded;
                hint.innerText = isExploded ? "СБОРКА МОДУЛЕЙ" : "ДЕТАЛИЗАЦИЯ ПРОТОТИПА";
            });

            function animate() {
                requestAnimationFrame(animate);
                
                parts.forEach(part => {
                    const target = isExploded 
                        ? part.originalPos.clone().add(part.explodeVec) 
                        : part.originalPos;
                    
                    // Плавное интерполирование позиций
                    part.mesh.position.lerp(target, 0.08); 
                });

                // Вращаем робота только когда он собран, чтобы было удобно рассматривать разлет
                if (!isExploded) {
                    model.rotation.y += 0.002;
                } else {
                    // Медленное затухание вращения или фиксация
                    model.rotation.y *= 0.98; 
                }
                
                controls.update();
                renderer.render(scene, camera);
            }
            animate();

        }, (xhr) => {
            const p = Math.round(xhr.loaded / xhr.total * 100);
            loaderStatus.innerText = `ЗАГРУЗКА ДАННЫХ: ${p}%`;
        });

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>

    <script>
        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
