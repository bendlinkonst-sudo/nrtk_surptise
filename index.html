<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>НРТК СЮРПРИЗ | Главная</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Stalinist+One&display=swap" rel="stylesheet">
    
    <script>
        // Проверка авторизации
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>

    <style>
        :root {
            --neon-blue: #00f2ff;    
            --neon-pink: #ff00ff;    
            --status-green: #39ff14; 
            --bg-overlay: radial-gradient(circle, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.9) 100%); 
        }

        body {
            background-color: #0a0a0a;
            background-image: url('background.jpg'); 
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            background-size: cover;
            margin: 0;
            padding: 0;
            font-family: 'Verdana', sans-serif;
            color: var(--neon-blue);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-overlay);
            z-index: -1;
        }

        /* --- ШАПКА В СТИЛЕ ЛАБОРАТОРИИ --- */
        .cyber-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 40px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 2px solid rgba(0, 242, 255, 0.2);
            box-sizing: border-box;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .cyber-header::after {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-pink), transparent);
            animation: scan 5s linear infinite;
        }

        @keyframes scan { 0% { left: -100%; } 100% { left: 100%; } }

        /* --- БЛОК ЛОГОТИПА --- */
        .logo-area { 
            display: flex; 
            align-items: center; 
            text-decoration: none; 
            color: #fff;
            gap: 15px;
        }

        .logo-img {
            height: 65px; /* Крупный логотип */
            width: auto;
            filter: drop-shadow(0 0 10px var(--neon-blue));
            transition: 0.4s;
        }

        .logo-text-block {
            display: flex;
            flex-direction: column;
        }

        .nrtk-sub {
            font-size: 9px;
            letter-spacing: 4px;
            color: var(--neon-blue);
            font-weight: bold;
            margin-bottom: -4px;
            text-transform: uppercase;
        }

        .brand-name {
            font-family: 'Stalinist One', cursive; /* Тот самый шрифт */
            font-size: 32px;
            letter-spacing: 1px;
            text-shadow: 3px 3px 0px var(--neon-pink);
            margin: 0;
        }

        .status-tag {
            font-size: 8px;
            color: var(--status-green);
            text-shadow: 0 0 5px var(--status-green);
            margin-top: 2px;
        }

        /* --- НАВИГАЦИЯ --- */
        .header-nav { display: flex; align-items: center; gap: 20px; }

        .nav-link {
            color: #fff;
            text-decoration: none;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 2px;
            transition: 0.3s;
            opacity: 0.7;
            text-transform: uppercase;
        }

        .nav-link:hover {
            opacity: 1;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .logout-btn {
            border: 1px solid var(--neon-pink);
            color: #fff;
            padding: 10px 20px;
            text-decoration: none;
            font-size: 10px;
            font-weight: bold;
            background: rgba(255, 0, 255, 0.1);
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            transition: 0.3s;
            cursor: pointer;
        }

        .logout-btn:hover {
            background: var(--neon-pink);
            color: #000;
            box-shadow: 0 0 20px var(--neon-pink);
        }

        /* --- ГЛАВНЫЙ ЭКРАН --- */
        .hero-section {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
        }

        .hero-title {
            font-family: 'Stalinist One', cursive;
            font-size: clamp(24px, 5vw, 48px);
            color: #ffffff;
            margin-bottom: 20px;
            text-shadow: 0 0 20px var(--neon-blue);
        }

        .hero-text {
            font-size: 18px;
            max-width: 800px;
            line-height: 1.6;
            margin-bottom: 40px;
            color: rgba(0, 242, 255, 0.8);
        }

        .hero-btn {
            display: inline-block;
            padding: 20px 60px;
            color: #fff;
            text-decoration: none;
            border: 2px solid var(--neon-pink);
            font-family: 'Stalinist One', cursive;
            font-size: 16px;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.3);
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            transition: 0.4s;
        }

        .hero-btn:hover {
            background: var(--neon-pink);
            color: #000;
            box-shadow: 0 0 40px var(--neon-pink);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <header class="cyber-header">
        <a href="index.html" class="logo-area">
            <img src="logo-clean.png" alt="НРТК" class="logo-img">
            <div class="logo-text-block">
                <span class="nrtk-sub">Научно-Робототехнический Комплекс</span>
                <h1 class="brand-name">СЮРПРИЗ</h1>
                <span class="status-tag">STATUS: SYSTEM_ONLINE // SECURED_CONNECTION</span>
            </div>
        </a>
        
        <nav class="header-nav">
            <a href="index.html" class="nav-link">ГЛАВНАЯ</a>
            <a href="shop.html" class="nav-link">КАТАЛОГ</a>
            <a href="account.html" class="nav-link">ДОСТУП</a>
            <a href="#" onclick="logout()" class="logout-btn">ВЫХОД [ESC]</a>
        </nav>
    </header>

    <main class="hero-section">
        <h2 class="hero-title">ЭРА РОБОТОТЕХНИКИ</h2>
        <p class="hero-text">
            Добро пожаловать в закрытый узел НРТК "СЮРПРИЗ". <br>
            Здесь куются технологии, которые завтра станут стандартом.
        </p>
        <a href="shop.html" class="hero-btn">В КАТАЛОГ</a>
    </main>

    <script>
        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }
    </script>

</body>
</html>
