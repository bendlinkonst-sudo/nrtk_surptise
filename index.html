<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>НРТК СЮРПРИЗ | Инженерный разбор</title>
    
    <script>
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>

    <style>
        :root {
            --neon-blue: #00f2ff;    
            --dark-blue: #0077ff;    
            --bg-overlay: radial-gradient(circle, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.9) 100%); 
        }

        /* --- ФОН СТРАНИЦЫ --- */
        body {
            background-color: #0a0a0a;
            background-image: url('background.jpg'); 
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            background-size: cover;
            margin: 0;
            padding: 0;
            font-family: 'Verdana', sans-serif;
            color: var(--neon-blue);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-overlay);
            z-index: -1;
        }

        /* --- КИБЕР-ШАПКА --- */
        .cyber-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid rgba(0, 242, 255, 0.3);
            box-sizing: border-box;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-area { display: flex; align-items: center; text-decoration: none; gap: 20px; }
        .logo-img { height: 70px; filter: drop-shadow(0 0 10px var(--neon-blue)); }
        .brand-name { font-size: 38px; font-weight: 900; color: #fff; text-transform: uppercase; text-shadow: 0 0 15px var(--dark-blue); margin: 0; }

        .header-nav { display: flex; align-items: center; gap: 30px; }
        .nav-link { color: #fff; text-decoration: none; font-size: 14px; font-weight: bold; transition: 0.3s; text-transform: uppercase; }
        .nav-link:hover { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }

        /* --- КОНТЕЙНЕР 3D СЦЕНЫ --- */
        #canvas-container {
            width: 100%;
            height: 75vh; /* Оптимальная высота, чтобы панель управления не уезжала вниз */
            min-height: 550px;
            position: relative;
            overflow: hidden;
            flex-grow: 1;
        }

        #loader-status {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: monospace;
            font-size: 18px;
            text-shadow: 0 0 10px var(--neon-blue);
            z-index: 1010;
        }

        /* --- СЛОЙ ДЛЯ СВЕТЯЩИХСЯ ТОЧЕК И ВЫНОСОК --- */
        .labels-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; 
            z-index: 900;
        }

        /* Сама интерактивная метка */
        .part-label {
            position: absolute;
            display: flex;
            align-items: center;
            transform: translate(-8px, -8px); /* Точное центрирование по центру точки */
            transition: opacity 0.25s ease;
            pointer-events: auto; 
        }

        /* Светящаяся неоновая точка на детали */
        .label-dot {
            width: 16px;
            height: 16px;
            background-color: var(--neon-blue);
            border-radius: 50%;
            border: 2px solid #ffffff;
            box-shadow: 0 0 15px var(--neon-blue);
            cursor: pointer;
            flex-shrink: 0;
            transition: transform 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease;
        }

        .part-label:hover .label-dot {
            transform: scale(1.4);
            background-color: #ff0055;
            box-shadow: 0 0 15px #ff0055, 0 0 30px #ff0055;
        }

        /* Всплывающая технологическая карточка с описанием */
        .label-card {
            background: rgba(0, 10, 20, 0.95);
            border: 1px solid var(--neon-blue);
            padding: 12px 16px;
            border-radius: 6px;
            margin-left: 15px;
            width: 260px;
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.8), 0 0 15px rgba(0, 242, 255, 0.2);
            opacity: 0;
            transform: translateX(-10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
        }

        .part-label:hover .label-card {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }

        .label-card h3 {
            font-family: monospace;
            font-size: 14px;
            color: var(--neon-blue);
            margin: 0 0 6px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .label-card p {
            font-family: sans-serif;
            font-size: 12px;
            color: #a0aec0;
            line-height: 1.4;
            margin: 0;
        }

        /* --- КИБЕРПАНК ПОЛЗУНОК РАЗБОРКИ --- */
        .controls-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid var(--neon-blue);
            padding: 12px 30px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 20px;
            backdrop-filter: blur(10px);
            z-index: 2000;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
        }

        .controls-panel label {
            font-family: monospace;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1.5px;
            color: #fff;
            text-shadow: 0 0 5px var(--neon-blue);
        }

        .controls-panel input[type="range"] {
            width: 250px;
            accent-color: var(--neon-blue);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header class="cyber-header">
        <a href="index.html" class="logo-area">
            <img src="logo-clean.png" alt="НРТК" class="logo-img">
            <div class="logo-text-block">
                <h1 class="brand-name">СЮРПРИЗ</h1>
            </div>
        </a>
        <nav class="header-nav">
            <a href="index.html" class="nav-link">ГЛАВНАЯ</a>
            <a href="shop.html" class="nav-link">КАТАЛОГ</a>
            <a href="#" onclick="logout()" class="nav-link" style="color: #ff4444;">ВЫХОД</a>
        </nav>
    </header>

    <div id="canvas-container">
        <div id="loader-status">СКАНИРОВАНИЕ СИСТЕМ...</div>
        
        <div id="controls-panel" class="controls-panel" style="display: none;">
            <label for="explodeSlider">КОНФИГУРАЦИЯ СБОРКИ</label>
            <input type="range" id="explodeSlider" min="0" max="1" step="0.005" value="0">
        </div>
        
        <div id="labels-container" class="labels-overlay"></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const container = document.getElementById('canvas-container');
        const loaderStatus = document.getElementById('loader-status');
        const controlsPanel = document.getElementById('controls-panel');
        const explodeSlider = document.getElementById('explodeSlider');
        const labelsContainer = document.getElementById('labels-container');
        
        const scene = new THREE.Scene();
        scene.background = null; // Оставляем холст прозрачным для background.jpg

        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 2, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        
        // --- АКТИВАЦИЯ ТЕНЕЙ В РЕНДЕРЕРЕ ---
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; // Мягкие тени
        
        container.appendChild(renderer.domElement);

        // Атмосферный свет для киберпанк-стилистики
        scene.add(new THREE.AmbientLight(0xffffff, 0.6)); // Чуть уменьшили общую яркость, чтобы тени выделились

        // Главный источник света, отбрасывающий тени (Неоновый синий)
        const sun = new THREE.DirectionalLight(0x00f2ff, 1.8);
        sun.position.set(4, 8, 5);
        sun.castShadow = true; // Разрешаем генерировать тени
        
        // Настройка карты теней для хорошего качества и производительности
        sun.shadow.mapSize.width = 2048;
        sun.shadow.mapSize.height = 2048;
        sun.shadow.camera.near = 0.5;
        sun.shadow.camera.far = 20;
        
        // Границы камеры теней, описывающие область вокруг робота
        const d = 4;
        sun.shadow.camera.left = -d;
        sun.shadow.camera.right = d;
        sun.shadow.camera.top = d;
        sun.shadow.camera.bottom = -d;
        sun.shadow.bias = -0.0005; // Фикс артефактов наложения
        scene.add(sun);

        // Боковая подсветка для контраста (Розово-красный неон)
        const fillLight = new THREE.DirectionalLight(0xff0055, 0.7);
        fillLight.position.set(-5, 4, -3);
        // Этот свет тени не отбрасывает, чтобы не перегружать сцену
        scene.add(fillLight);

        // --- СОЗДАНИЕ НЕВИДИМОГО ПОЛА ДЛЯ УЛАВЛИВАНИЯ ТЕНЕЙ ---
        const floorGeo = new THREE.PlaneGeometry(50, 50);
        // ShadowMaterial рендерит ТОЛЬКО падающие тени, оставляя плоскость прозрачной
        const floorMat = new THREE.ShadowMaterial({ opacity: 0.5 }); 
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -0.85; // Настраивается под нижнюю точку гусениц модели
        floor.receiveShadow = true; // Плоскость принимает тени
        scene.add(floor);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 + 0.1; // Ограничение поворота под пол

        const activeLabels = []; 
        let robotModel = null;
        const loader = new GLTFLoader();

        // Карта перевода внутренних имен 3D-модели на красивый русский язык
        const nameMapping = {
            'Body': 'Основное шасси / Рама',
            'skelet': 'Активная защита корпуса',
            'Camera': 'Камера оптического обзора',
            'antenna': 'Модуль связи / Антенна',
            'Wing_left': 'Левое крыло',
            'Wing_right': 'Правое крыло',
            'Bonnet': 'Защитный капот ДВС',
            'transport_module': 'Грузовой отсек платформы',
            'roller_wheel': 'Опорный каток ходовой',
            'Caterpillar_left': 'Гусеничная лента (левая)',
            'Caterpillar_right': 'Гусеничная лента (правая)',
            'pendant_right': 'Ходовая часть правая',
            'pendant_left': 'Ходовая часть левая',
            'Motor_left': 'Тяговый электродвигатель (левый)',
            'Motor_right': 'Тяговый электродвигатель (правый)',
            'Electronics': 'Электронный блок БЦВМ'
        };

        loader.load('./tank_nrtk.glb', (gltf) => {
            robotModel = gltf.scene;
            scene.add(robotModel);

            // Авто-центрирование по габаритам модели
            const box = new THREE.Box3().setFromObject(robotModel);
            const center = box.getCenter(new THREE.Vector3());
            robotModel.position.sub(center);
            
            robotModel.updateMatrixWorld(true);

            // Подгоняем высоту пола точно под нижнюю точку модели
            floor.position.y = box.min.y - center.y;

            // Парсинг деталей, настройка теней и развешивание маркеров
            robotModel.traverse((child) => {
                if (child.isMesh) {
                    // --- ВКЛЮЧАЕМ ТЕНИ ДЛЯ КАЖДОЙ ДЕТАЛИ ---
                    child.castShadow = true;    // Деталь отбрасывает тень
                    child.receiveShadow = true; // Принимает тени от других деталей

                    // Корректируем материалы, чтобы они круто реагировали на свет
                    if (child.material) {
                        child.material.roughness = 0.3; // Небольшой кибер-глянец
                    }

                    // Сохраняем исходное положение для плавного lerp
                    child.userData.originalPosition = child.position.clone();
                    
                    const worldPos = new THREE.Vector3();
                    child.getWorldPosition(worldPos);
                    
                    // Вычисляем вектор разлёта деталей от центра
                    let explodeVec = worldPos.clone().normalize();
                    const combinedName = `${child.name ? child.name.toLowerCase() : ''} ${(child.parent && child.parent.name) ? child.parent.name.toLowerCase() : ''}`;

                    // Тонкие настройки направлений взрыв-схемы
                    if (combinedName.includes('body') || combinedName.includes('skelet') || combinedName.includes('rama') || combinedName.includes('chassis')) {
                        explodeVec.set(0, 0, 0); // Центр держится на месте
                    } else if (combinedName.includes('bonnet')) {
                        explodeVec.set(0, 0.8, 0.8); // Капот улетает вверх-вперед
                    } else if (combinedName.includes('transport_module')) {
                        explodeVec.set(0, 0.8, -0.8); // Отсек улетает вверх-назад
                    } else {
                        if (explodeVec.length() === 0) {
                            explodeVec.set((Math.random() - 0.5) * 2, 0.2, (Math.random() - 0.5) * 2).normalize();
                        }
                        explodeVec.multiplyScalar(0.7);
                        explodeVec.y += 0.2; // Приподнимаем элементы
                    }
                    child.userData.explodeVector = explodeVec;

                    // Поиск совпадений имени для генерации точки
                    let customTitle = '';
                    for (const [key, value] of Object.entries(nameMapping)) {
                        if (combinedName.includes(key.toLowerCase())) {
                            customTitle = value;
                            break;
                        }
                    }

                    // Если нашли деталь в маппинге — создаем HTML метку
                    if (customTitle) {
                        const labelEl = document.createElement('div');
                        labelEl.className = 'part-label';
                        labelEl.innerHTML = `
                            <div class="label-dot"></div>
                            <div class="label-card">
                                <h3>${customTitle}</h3>
                                <p>Информационно-технический узел роботизированного комплекса «СЮРПРИЗ».</p>
                            </div>
                        `;
                        labelsContainer.appendChild(labelEl);

                        activeLabels.push({
                            mesh: child,
                            labelDOM: labelEl
                        });
                    }
                }
            });

            loaderStatus.style.display = 'none';
            controlsPanel.style.display = 'flex';

            animate();

        }, (xhr) => {
            const p = Math.round(xhr.loaded / xhr.total * 100);
            loaderStatus.innerText = `СКАНИРОВАНИЕ СИСТЕМ: ${p}%`;
        });

        // Матричная проекция 3D точек на 2D экран
        function updateLabelsPositions() {
            const tempV = new THREE.Vector3();
            const widthHalf = container.clientWidth / 2;
            const heightHalf = container.clientHeight / 2;

            activeLabels.forEach(part => {
                part.labelDOM.style.opacity = '1';
                part.labelDOM.style.pointerEvents = 'auto';

                part.mesh.getWorldPosition(tempV);
                tempV.project(camera);

                // Если деталь оказалась за спиной у камеры, скрываем ее маркер
                if (tempV.z > 1) {
                    part.labelDOM.style.display = 'none';
                    return;
                } else {
                    part.labelDOM.style.display = 'flex';
                }

                // Перевод в пиксельные координаты UI-overlay слоя
                const x = (tempV.x * widthHalf) + widthHalf;
                const y = -(tempV.y * heightHalf) + heightHalf;

                part.labelDOM.style.left = `${x}px`;
                part.labelDOM.style.top = `${y}px`;
            });
        }

        // Главный цикл отрисовки сцены
        function animate() {
            requestAnimationFrame(animate);
            
            const sliderValue = parseFloat(explodeSlider.value);

            // Обработка разлёта мешей на основе позиции ползунка
            if (robotModel) {
                robotModel.traverse((child) => {
                    if (child.isMesh && child.userData.originalPosition && child.userData.explodeVector) {
                        const targetPos = child.userData.originalPosition.clone().add(
                            child.userData.explodeVector.clone().multiplyScalar(sliderValue)
                        );
                        // Плавный интерполяционный переход lerp
                        child.position.lerp(targetPos, 0.1);
                    }
                });

                // Красивое авто-вращение, когда робот полностью собран
                if (sliderValue === 0) {
                    robotModel.rotation.y += 0.002;
                }
            }

            controls.update();
            
            // 1. Сначала жестко рендерим 3D геометрию с тенями
            renderer.render(scene, camera);
            // 2. И только поверх готового кадра проецируем точки, убирая любые лаги и тряску!
            updateLabelsPositions();
        }

        // Адаптив холста при изменении размеров окна
        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>

    <script>
        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
