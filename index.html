<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>НРТК СЮРПРИЗ | Главная</title>
    
    <script>
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>

    <style>
        :root {
            --neon-blue: #00f2ff;    
            --dark-blue: #0077ff;    
            --bg-overlay: radial-gradient(circle, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.9) 100%); 
        }

        body {
            background-color: #0a0a0a;
            background-image: url('background.jpg'); 
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            background-size: cover;
            margin: 0;
            padding: 0;
            font-family: 'Verdana', sans-serif;
            color: var(--neon-blue);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-overlay);
            z-index: -1;
        }

        /* --- ОБНОВЛЕННАЯ ШАПКА --- */
        .cyber-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid rgba(0, 242, 255, 0.3);
            box-sizing: border-box;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* --- БЛОК ЛОГОТИПА И ЦЕНТРОВКА --- */
        .logo-area { 
            display: flex; 
            align-items: center; 
            text-decoration: none; 
            gap: 20px;
        }

        .logo-img {
            height: 70px;
            width: auto;
            filter: drop-shadow(0 0 10px var(--neon-blue));
        }

        .logo-text-block {
            display: flex;
            flex-direction: column;
            align-items: center; /* Центрируем СЮРПРИЗ под надписью */
            text-align: center;
        }

        .nrtk-sub {
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--neon-blue);
            font-weight: bold;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .brand-name {
            font-size: 38px; /* Сделал крупнее */
            font-weight: 900;
            letter-spacing: 4px;
            color: #fff;
            margin: 0;
            text-transform: uppercase;
            text-shadow: 0 0 15px var(--dark-blue);
            line-height: 1;
        }

        /* --- НАВИГАЦИЯ --- */
        .header-nav { 
            display: flex; 
            align-items: center; 
            gap: 30px; /* Увеличил расстояние */
        }

        .nav-link {
            color: #fff;
            text-decoration: none;
            font-size: 14px; /* Крупнее, как просили */
            font-weight: bold;
            letter-spacing: 1.5px;
            transition: 0.3s;
            opacity: 0.8;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-link:hover {
            opacity: 1;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .cart-icon {
            font-size: 18px;
        }

        .logout-btn {
            border: 1px solid var(--neon-blue);
            color: #fff;
            padding: 10px 20px;
            text-decoration: none;
            font-size: 11px;
            font-weight: bold;
            background: rgba(0, 242, 255, 0.1);
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            transition: 0.3s;
            cursor: pointer;
        }

        .logout-btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 20px var(--neon-blue);
        }

        /* --- КОНТЕНТ --- */
        .hero-section {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
        }

        .hero-title {
            font-size: clamp(30px, 6vw, 56px);
            font-weight: 900;
            color: #ffffff;
            margin-bottom: 20px;
            text-shadow: 0 0 20px var(--neon-blue);
            text-transform: uppercase;
        }

        .hero-text {
            font-size: 18px;
            max-width: 800px;
            line-height: 1.6;
            margin-bottom: 40px;
            color: rgba(0, 242, 255, 0.8);
        }

        .hero-btn {
            display: inline-block;
            padding: 20px 60px;
            color: #fff;
            text-decoration: none;
            border: 2px solid var(--neon-blue);
            font-size: 18px;
            font-weight: bold;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            transition: 0.4s;
        }

        .hero-btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 40px var(--neon-blue);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <header class="cyber-header">
        <a href="index.html" class="logo-area">
            <img src="logo-clean.png" alt="НРТК" class="logo-img">
            <div class="logo-text-block">
                <span class="nrtk-sub">Научно-Робототехнический Комплекс</span>
                <h1 class="brand-name">СЮРПРИЗ</h1>
            </div>
        </a>
        
        <nav class="header-nav">
            <a href="index.html" class="nav-link">ГЛАВНАЯ</a>
            <a href="shop.html" class="nav-link">КАТАЛОГ</a>
            <a href="profile.html" class="nav-link">МОЙ ПРОФИЛЬ</a>
            <a href="cart.html" class="nav-link">КОРЗИНА <span class="cart-icon">🛒</span></a>
            <a href="#" onclick="logout()" class="logout-btn">ВЫХОД</a>
        </nav>
    </header>

    <main class="hero-section">
        <h2 class="hero-title">ПЕРЕДОВЫЕ ТЕХНОЛОГИИ</h2>
        <p class="hero-text">
            Добро пожаловать в закрытый узел НРТК "СЮРПРИЗ".<br>
            Доступ к прототипам разрешен только авторизованному персоналу.
        </p>
        <a href="shop.html" class="hero-btn">ПЕРЕЙТИ В КАТАЛОГ</a>
    </main>

    <script>
        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }
    </script>

</body>
</html>
