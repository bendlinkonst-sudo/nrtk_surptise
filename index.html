<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>НРТК СЮРПРИЗ | Инженерный разбор</title>
    
    <script>
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>

    <style>
        :root {
            --neon-blue: #00f2ff;    
            --dark-blue: #0077ff;    
            --bg-overlay: radial-gradient(circle, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.9) 100%); 
        }

        body {
            background-color: #0a0a0a;
            background-image: url('background.jpg'); 
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            background-size: cover;
            margin: 0;
            padding: 0;
            font-family: 'Verdana', sans-serif;
            color: var(--neon-blue);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-overlay);
            z-index: -1;
        }

        .cyber-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid rgba(0, 242, 255, 0.3);
            box-sizing: border-box;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-area { display: flex; align-items: center; text-decoration: none; gap: 20px; }
        .logo-img { height: 70px; filter: drop-shadow(0 0 10px var(--neon-blue)); }
        .brand-name { font-size: 38px; font-weight: 900; color: #fff; text-transform: uppercase; text-shadow: 0 0 15px var(--dark-blue); margin: 0; }

        .header-nav { display: flex; align-items: center; gap: 30px; }
        .nav-link { color: #fff; text-decoration: none; font-size: 14px; font-weight: bold; transition: 0.3s; text-transform: uppercase; }
        .nav-link:hover { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }

        #canvas-container {
            width: 100%;
            height: 600px; 
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }

        #explode-btn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            border: 2px solid var(--neon-blue);
            padding: 12px 35px;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
            transition: all 0.3s ease;
            z-index: 2000;
        }

        #explode-btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 25px var(--neon-blue);
        }

        #loader-status {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: monospace;
            text-shadow: 0 0 10px var(--neon-blue);
            z-index: 10;
        }

        /* ЖЕСТКИЙ СЛОЙ ДЛЯ ВЫНОСОК */
        .labels-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; 
            z-index: 1000;
        }

        .tech-label-container {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: translate(-50%, -100%); 
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease-out;
        }

        .tech-label-container.visible {
            opacity: 1;
        }

        .tech-card {
            background: rgba(0, 10, 20, 0.9);
            border: 1px solid var(--neon-blue);
            padding: 6px 14px;
            border-radius: 4px;
            color: #ffffff;
            font-family: monospace;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            white-space: nowrap;
            letter-spacing: 1px;
            box-shadow: 0 0 12px rgba(0, 242, 255, 0.4);
        }

        .tech-pointer {
            width: 2px;
            height: 35px;
            background: linear-gradient(to bottom, var(--neon-blue), rgba(0, 242, 255, 0.1));
        }

        .tech-dot {
            width: 6px;
            height: 6px;
            background: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon-blue);
        }
    </style>
</head>
<body>

    <header class="cyber-header">
        <a href="index.html" class="logo-area">
            <img src="logo-clean.png" alt="НРТК" class="logo-img">
            <div class="logo-text-block">
                <h1 class="brand-name">СЮРПРИЗ</h1>
            </div>
        </a>
        <nav class="header-nav">
            <a href="index.html" class="nav-link">ГЛАВНАЯ</a>
            <a href="shop.html" class="nav-link">КАТАЛОГ</a>
            <a href="#" onclick="logout()" class="nav-link" style="color: #ff4444;">ВЫХОД</a>
        </nav>
    </header>

    <div id="canvas-container">
        <div id="loader-status">СКАНИРОВАНИЕ СИСТЕМ...</div>
        <button id="explode-btn" style="display: none;">Детализация прототипа</button>
        
        <div id="labels-container" class="labels-overlay"></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const container = document.getElementById('canvas-container');
        const loaderStatus = document.getElementById('loader-status');
        const explodeBtn = document.getElementById('explode-btn');
        const labelsContainer = document.getElementById('labels-container');
        
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 4, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        container.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        let isExploded = false;
        const parts = []; 
        let robotModel = null;
        const loader = new GLTFLoader();

        const nameMapping = {
            'Body': 'Основное шасси / Рама',
            'skelet': 'Активная защита',
            'Camera': 'Камера',
            'antenna': 'Антенна',
            'Wing_left': 'Левое крыло',
            'Wing_right': 'Правое крыло',
            'Bonnet': 'Защитный капот ДВС',
            'transport_module': 'Грузовой отсек',
            'roller_wheel': 'Каток',
            'Caterpillar_left': 'Гусеница левая',
            'Caterpillar_right': 'Гусеница правая',
            'pendant_right': 'Ходовая часть правая',
            'pendant_left': 'Ходовая часть левая',
            'Motor_left': 'Двигатель левый',
            'Motor_right': 'Двигатель правый',
            'Electronics': 'Электронный блок управления роботом'
        };

        loader.load('./tank_nrtk.glb', (gltf) => {
            robotModel = gltf.scene;
            
            // Чтобы getWorldPosition работала идеально корректно, сначала добавляем модель в сцену
            scene.add(robotModel);

            // ИСПРАВЛЕНИЕ БАГА ЦЕНТРИРОВАНИЯ: Сдвигаем саму модель ПОСЛЕ добавления в сцену,
            // чтобы Three.js обновил матрицы трансформации и правильно считал мировые координаты
            const box = new THREE.Box3().setFromObject(robotModel);
            const center = box.getCenter(new THREE.Vector3());
            robotModel.position.sub(center);
            
            // Форсируем обновление матриц, чтобы getWorldPosition выдавал точные данные
            robotModel.updateMatrixWorld(true);

            robotModel.traverse((child) => {
                if (child.isMesh) {
                    const nameLower = child.name ? child.name.toLowerCase() : '';
                    const parentNameLower = (child.parent && child.parent.name) ? child.parent.name.toLowerCase() : '';
                    const combinedName = `${nameLower} ${parentNameLower}`;

                    let explodeVec = new THREE.Vector3();
                    let isMainPart = false;
                    let customTitle = '';

                    for (const [key, value] of Object.entries(nameMapping)) {
                        if (combinedName.includes(key.toLowerCase())) {
                            isMainPart = true;
                            customTitle = value;
                            break;
                        }
                    }

                    if (combinedName.includes('body') || combinedName.includes('skelet') || combinedName.includes('rama') || combinedName.includes('chassis') || combinedName.includes('base')) {
                        explodeVec.set(0, 0, 0); 
                    } else if (combinedName.includes('bonnet')) {
                        explodeVec.set(0, 0.7, 0.9); 
                    } else if (combinedName.includes('transport_module')) {
                        explodeVec.set(0, 0.7, -0.9); 
                    } else {
                        const worldPos = new THREE.Vector3();
                        child.getWorldPosition(worldPos);
                        explodeVec = worldPos.clone().normalize();

                        if (explodeVec.length() === 0 || (Math.abs(explodeVec.x) < 0.1 && Math.abs(explodeVec.z) < 0.1)) {
                            explodeVec.set((Math.random() - 0.5) * 2, 0.2, (Math.random() - 0.5) * 2).normalize();
                        }
                        explodeVec.multiplyScalar(0.8);
                        explodeVec.y += 0.35;
                    }

                    let labelDOM = null;
                    if (isMainPart) {
                        const containerDiv = document.createElement('div');
                        containerDiv.className = 'tech-label-container';

                        const cardDiv = document.createElement('div');
                        cardDiv.className = 'tech-card';
                        cardDiv.innerText = customTitle;

                        const pointerDiv = document.createElement('div');
                        pointerDiv.className = 'tech-pointer';

                        const dotDiv = document.createElement('div');
                        dotDiv.className = 'tech-dot';

                        containerDiv.appendChild(cardDiv);
                        containerDiv.appendChild(pointerDiv);
                        containerDiv.appendChild(dotDiv);
                        labelsContainer.appendChild(containerDiv);

                        labelDOM = containerDiv;
                    }

                    parts.push({
                        mesh: child,
                        originalPos: child.position.clone(),
                        explodeVec: explodeVec,
                        labelDOM: labelDOM
                    });
                }
            });

            loaderStatus.style.display = 'none';
            explodeBtn.style.display = 'block';

            explodeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                isExploded = !isExploded;
                explodeBtn.innerText = isExploded ? "Сборка модулей" : "Детализация прототипа";

                parts.forEach(part => {
                    if (part.labelDOM) {
                        if (isExploded) {
                            setTimeout(() => { part.labelDOM.classList.add('visible'); }, 400);
                        } else {
                            part.labelDOM.classList.remove('visible');
                        }
                    }
                });
            });

            function updateLabelsPositions() {
                if (!isExploded) return;

                const tempV = new THREE.Vector3();
                const widthHalf = container.clientWidth / 2;
                const heightHalf = container.clientHeight / 2;

                parts.forEach(part => {
                    if (part.labelDOM) {
                        part.mesh.getWorldPosition(tempV);
                        tempV.project(camera);

                        if (tempV.z > 1) {
                            part.labelDOM.style.display = 'none';
                            return;
                        } else {
                            part.labelDOM.style.display = 'flex';
                        }

                        const x = (tempV.x * widthHalf) + widthHalf;
                        const y = -(tempV.y * heightHalf) + heightHalf;

                        part.labelDOM.style.left = `${x}px`;
                        part.labelDOM.style.top = `${y}px`;
                    }
                });
            }

            function animate() {
                requestAnimationFrame(animate);
                
                parts.forEach(part => {
                    const target = isExploded 
                        ? part.originalPos.clone().add(part.explodeVec) 
                        : part.originalPos;
                    
                    part.mesh.position.lerp(target, 0.08); 
                });

                if (!isExploded && robotModel) {
                    robotModel.rotation.y += 0.003;
                }
                
                controls.update();
                
                // ИСПРАВЛЕНИЕ: Сначала рендерим сцену, чтобы все меши заняли новые lerp-позиции,
                // и только потом считаем проекции для HTML-табличек! Тогда не будет лагов.
                renderer.render(scene, camera);
                updateLabelsPositions();
            }
            animate();

        }, (xhr) => {
            const p = Math.round(xhr.loaded / xhr.total * 100);
            loaderStatus.innerText = `ЗАГРУЗКА ДАННЫХ: ${p}%`;
        });

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>

    <script>
        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
