<!DOCTYPE html>
<html lang="ru">
<head>
    <script>
        // Проверка авторизации
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>НРТК СЮРПРИЗ | Главная</title>
    <style>
        :root {
            --neon-blue: #00f2ff;    
            --neon-pink: #ff00ff;    
            --status-green: #39ff14; 
            --bg-overlay: radial-gradient(circle, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.9) 100%); 
        }

        body {
            background-color: #0a0a0a;
            background-image: url('background.jpg'); 
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            background-size: cover;
            margin: 0;
            padding: 0;
            font-family: 'Verdana', sans-serif;
            color: var(--neon-blue);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-overlay);
            z-index: -1;
        }

        /* --- ОБНОВЛЕННАЯ ШАПКА --- */
        .cyber-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 50px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0, 242, 255, 0.3);
            box-sizing: border-box;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* Сканирующая полоса */
        .cyber-header::after {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-pink), transparent);
            animation: scan 4s linear infinite;
        }

        @keyframes scan { 0% { left: -100%; } 100% { left: 100%; } }

        /* СТИЛИЗАЦИЯ ЛОГОТИПА */
        .logo-area { 
            display: flex; 
            align-items: center; 
            text-decoration: none; 
            color: inherit; 
        }

        .logo-img {
            height: 50px; /* Оптимальный размер для шапки */
            width: auto;
            margin-right: 15px;
            filter: drop-shadow(0 0 8px var(--neon-blue));
            transition: 0.3s;
        }

        .logo-area:hover .logo-img {
            filter: drop-shadow(0 0 15px var(--neon-pink));
            transform: rotate(-3deg) scale(1.05);
        }

        .tech-font {
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 8px rgba(0, 242, 255, 0.6);
        }

        .status-online {
            display: block;
            font-size: 9px;
            color: var(--status-green);
            text-shadow: 0 0 10px var(--status-green);
            letter-spacing: 1px;
            margin-top: 2px;
        }

        /* --- НАВИГАЦИЯ --- */
        .header-nav { display: flex; align-items: center; }

        .nav-link {
            color: var(--neon-blue);
            text-decoration: none;
            margin: 0 15px;
            font-size: 11px;
            transition: 0.3s;
            opacity: 0.8;
        }

        .nav-link:hover {
            color: var(--neon-pink);
            text-shadow: 0 0 15px var(--neon-pink);
            opacity: 1;
        }

        .cart-btn {
            font-size: 20px;
            text-decoration: none;
            margin: 0 20px;
            transition: 0.3s;
        }

        .cart-btn:hover { transform: scale(1.2); }

        .logout-btn {
            border: 1px solid var(--neon-pink);
            color: #fff;
            padding: 8px 20px;
            text-decoration: none;
            font-size: 11px;
            background: rgba(255, 0, 255, 0.1);
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: var(--neon-pink);
            color: #000;
            box-shadow: 0 0 20px var(--neon-pink);
        }

        /* --- ГЛАВНЫЙ КОНТЕНТ --- */
        .hero-section {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
        }

        .hero-title {
            font-size: clamp(28px, 6vw, 50px);
            color: #ffffff;
            margin-bottom: 20px;
            text-shadow: 0 0 25px var(--neon-blue);
        }

        .hero-text {
            font-size: 18px;
            max-width: 700px;
            line-height: 1.6;
            margin-bottom: 40px;
            color: rgba(0, 242, 255, 0.8);
        }

        .hero-btn {
            display: inline-block;
            padding: 18px 50px;
            color: #fff;
            text-decoration: none;
            border: 2px solid var(--neon-pink);
            font-size: 16px;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.3);
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            transition: 0.4s;
        }

        .hero-btn:hover {
            background: var(--neon-pink);
            color: #000;
            box-shadow: 0 0 40px var(--neon-pink);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <header class="cyber-header">
        <a href="index.html" class="logo-area">
            <img src="76767645.jpg" alt="Лого НРТК" class="logo-img">
            <div class="logo-text">
                <span class="tech-font" style="font-size: 20px;">НРТК СЮРПРИЗ</span>
                <span class="status-online">● СИСТЕМА_АКТИВНА</span>
            </div>
        </a>
        
        <nav class="header-nav">
            <a href="index.html" class="nav-link tech-font">ГЛАВНАЯ</a>
            <a href="shop.html" class="nav-link tech-font">МАГАЗИН</a>
            <a href="account.html" class="nav-link tech-font">АККАУНТ</a>
            <a href="cart.html" class="cart-btn">🛒</a>
            <a href="#" onclick="logout()" class="logout-btn tech-font">ВЫХОД</a>
        </nav>
    </header>

    <main class="hero-section">
        <h1 class="hero-title tech-font">БУДУЩЕЕ РОБОТОТЕХНИКИ ЗДЕСЬ</h1>
        <p class="hero-text">
            Добро пожаловать в мир, где Вы познакомитесь с НРТК "СЮРПРИЗ".<br>
            Мы создаем модули, которые меняют правила игры.
        </p>
        <a href="shop.html" class="hero-btn tech-font">ПЕРЕЙТИ В КАТАЛОГ</a>
    </main>

    <script>
        function logout() {
            localStorage.clear(); // Удаляем данные об авторизации
            window.location.href = 'login.html'; // Выбрасываем на вход
        }
    </script>

</body>
</html>
