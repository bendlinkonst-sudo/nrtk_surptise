<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Робот — Исправление ошибок</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #slider-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.75);
            padding: 12px 25px;
            border-radius: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 10;
        }
        #explode-slider {
            width: 200px;
            cursor: pointer;
        }
        .slider-label {
            color: #fff;
            font-size: 14px;
            user-select: none;
        }
        #slider-value {
            min-width: 40px;
            text-align: right;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="slider-container">
        <span class="slider-label">Сборка:</span>
        <input type="range" id="explode-slider" min="0" max="100" value="0">
        <span class="slider-label" id="slider-value">0%</span>
    </div>

    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, controls;
        let robotModel = null;
        const originalPositions = new Map();
        
        let targetExplodeFactor = 0;
        let currentExplodeFactor = 0;

        // Запуск инициализации с отловом возможных ошибок
        try {
            init();
            animate();
        } catch (e) {
            console.error("Критическая ошибка при запуске сцены:", e);
            alert("Что-то пошло не так при создании 3D сцены. Проверь консоль браузера (F12)!");
        }

        function init() {
            const container = document.getElementById('canvas-container');

            // 1. Создание сцены и тумана
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x1a1a1a, 0.05);

            // 2. Настройка камеры
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 3, 6);

            // 3. Создание рендерера
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            
            // Безопасное включение теней
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            
            container.appendChild(renderer.domElement);

            // 4. Управление камерой (OrbitControls)
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 + 0.1; 

            // 5. Освещение (Универсальная яркая схема)
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5); // Базовый свет
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 1.5); // Направленный свет для теней
            dirLight.position.set(5, 10, 7);
            dirLight.castShadow = true;
            
            // Настройка качества теней
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            dirLight.shadow.camera.near = 0.5;
            dirLight.shadow.camera.far = 25;
            const d = 6;
            dirLight.shadow.camera.left = -d;
            dirLight.shadow.camera.right = d;
            dirLight.shadow.camera.top = d;
            dirLight.shadow.camera.bottom = -d;
            dirLight.shadow.bias = -0.0005;
            scene.add(dirLight);

            // Подсветка снизу
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.4);
            hemiLight.position.set(0, 20, 0);
            scene.add(hemiLight);

            // 6. Пол для отображения теней
            const floorGeo = new THREE.PlaneGeometry(50, 50);
            const floorMat = new THREE.ShadowMaterial({ opacity: 0.3 }); // Полупрозрачные тени
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = -1.2; 
            floor.receiveShadow = true; 
            scene.add(floor);

            // 7. Загрузка модели робота
            const loader = new THREE.GLTFLoader();
            
            // ВНИМАНИЕ: Проверь, чтобы имя файла совпадало с твоим (robot.gltf или scene.gltf или robot.glb)
            loader.load('robot.gltf', function (gltf) {
                robotModel = gltf.scene;
                
                // Центрируем модель автоматически
                const box = new THREE.Box3().setFromObject(robotModel);
                const center = box.getCenter(new THREE.Vector3());
                robotModel.position.x += (robotModel.position.x - center.x);
                robotModel.position.z += (robotModel.position.z - center.z);

                // Настраиваем тени и свойства материалов для каждой детали
                robotModel.traverse(function (child) {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;

                        if (child.material) {
                            child.material.roughness = 0.4;
                            child.material.metalness = 0.2;
                        }

                        // Сохраняем позиции для разборки
                        originalPositions.set(child, {
                            position: child.position.clone(),
                            direction: child.position.clone().normalize()
                        });
                    }
                });

                scene.add(robotModel);
                console.log("Робот успешно добавлен на сцену!");
                
            }, function (xhr) {
                // Прогресс загрузки в консоли
                console.log((xhr.loaded / xhr.total * 100) + '% загружено');
            }, function (error) {
                console.error('Ошибка при загрузке GLTF-файла:', error);
            });

            // 8. Логика ползунка
            const slider = document.getElementById('explode-slider');
            const sliderValueText = document.getElementById('slider-value');
            
            slider.addEventListener('input', function (e) {
                const val = parseInt(e.target.value);
                if (sliderValueText) sliderValueText.innerText = val + '%';
                targetExplodeFactor = (val / 100) * 1.5; 
            });

            window.addEventListener('resize', onWindowResize, false);
        }

        function updateExplosion() {
            if (!robotModel || originalPositions.size === 0) return;

            currentExplodeFactor += (targetExplodeFactor - currentExplodeFactor) * 0.08;

            if (Math.abs(targetExplodeFactor - currentExplodeFactor) < 0.001) {
                currentExplodeFactor = targetExplodeFactor;
            }

            originalPositions.forEach((data, child) => {
                const origPos = data.position;
                const dir = data.direction;
                
                child.position.x = origPos.x + dir.x * currentExplodeFactor;
                child.position.y = origPos.y + dir.y * currentExplodeFactor;
                child.position.z = origPos.z + dir.z * currentExplodeFactor;
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            updateExplosion();
            if (controls) controls.update();
            if (renderer && scene && camera) renderer.render(scene, camera);
        }
    </script>
</body>
</html>
