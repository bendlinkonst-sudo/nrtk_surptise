<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>НРТК СЮРПРИЗ | Инженерный разбор</title>
    
    <script>
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>

    <style>
        :root {
            --neon-blue: #00f2ff;    
            --dark-blue: #0077ff;    
            --bg-overlay: radial-gradient(circle, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.9) 100%); 
        }

        body {
            background-color: #0a0a0a;
            background-image: url('background.jpg'); 
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            background-size: cover;
            margin: 0;
            padding: 0;
            font-family: 'Verdana', sans-serif;
            color: var(--neon-blue);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-overlay);
            z-index: -1;
        }

        .cyber-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid rgba(0, 242, 255, 0.3);
            box-sizing: border-box;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-area { display: flex; align-items: center; text-decoration: none; gap: 20px; }
        .logo-img { height: 70px; filter: drop-shadow(0 0 10px var(--neon-blue)); }
        .brand-name { font-size: 38px; font-weight: 900; color: #fff; text-transform: uppercase; text-shadow: 0 0 15px var(--dark-blue); margin: 0; }

        .header-nav { display: flex; align-items: center; gap: 30px; }
        .nav-link { color: #fff; text-decoration: none; font-size: 14px; font-weight: bold; transition: 0.3s; text-transform: uppercase; }
        .nav-link:hover { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }

        #canvas-container {
            width: 100%;
            height: 600px; 
            margin-top: 20px;
            position: relative;
            cursor: pointer;
        }

        #hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border: 1px solid var(--neon-blue);
            border-radius: 20px;
            font-size: 12px;
            pointer-events: none;
            animation: pulse 2s infinite;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        #loader-status {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: monospace;
            text-shadow: 0 0 10px var(--neon-blue);
        }
    </style>
</head>
<body>

    <header class="cyber-header">
        <a href="index.html" class="logo-area">
            <img src="logo-clean.png" alt="НРТК" class="logo-img">
            <div class="logo-text-block">
                <h1 class="brand-name">СЮРПРИЗ</h1>
            </div>
        </a>
        <nav class="header-nav">
            <a href="index.html" class="nav-link">ГЛАВНАЯ</a>
            <a href="shop.html" class="nav-link">КАТАЛОГ</a>
            <a href="#" onclick="logout()" class="nav-link" style="color: #ff4444;">ВЫХОД</a>
        </nav>
    </header>

    <div id="canvas-container">
        <div id="loader-status">СКАНИРОВАНИЕ СИСТЕМ...</div>
        <div id="hint">КЛИКНИТЕ ДЛЯ ДЕТАЛИЗАЦИИ</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const container = document.getElementById('canvas-container');
        const loaderStatus = document.getElementById('loader-status');
        const hint = document.getElementById('hint');
        
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 5, 10); // Немного отдалили камеру, чтобы разлет помещался

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        container.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        let isExploded = false;
        const animatedObjects = []; // Здесь будем хранить ГРУППЫ или МЕШИ верхнего уровня
        let robotModel = null;
        const loader = new GLTFLoader();

        loader.load('./tank_nrtk.glb', (gltf) => {
            robotModel = gltf.scene;
            
            // Центрируем модель
            const box = new THREE.Box3().setFromObject(robotModel);
            const center = box.getCenter(new THREE.Vector3());
            robotModel.position.sub(center);
            scene.add(robotModel);

            console.log("--- ИНИЦИАЛИЗАЦИЯ СТРУКТУРЫ МОДЕЛЕЙ ---");

            // Проходимся по дереву объектов. Нам нужно найти те узлы, чьи ИМЕНА соответствуют модулям.
            // Чтобы не двигать внутренние меши отдельно, мы ищем самый верхний объект с нужным именем.
            robotModel.traverse((obj) => {
                if (!obj.name) return;

                const nameLower = obj.name.toLowerCase();
                let explodeVec = null;

                // Задаем явные и мощные векторы разлета для ЦЕЛЫХ узлов (дистанция ~ 2.5 - 4.0 единицы)
                if (nameLower.includes('driver') || nameLower.includes('motor_') || nameLower.includes('battery') || nameLower.includes('electronics')) {
                    explodeVec = new THREE.Vector3(0, 3.0, 0); // Внутренности мощно идут вверх
                } 
                else if (nameLower.includes('camera') || nameLower.includes('antenna')) {
                    explodeVec = new THREE.Vector3(0, 4.5, 0); // Камера и антенна летят в стратосферу над начинкой
                } 
                else if (nameLower.includes('bonnet')) {
                    explodeVec = new THREE.Vector3(0, 1.5, 3.0); // Капот откидывается вперед и вверх
                } 
                else if (nameLower.includes('transport_module')) {
                    explodeVec = new THREE.Vector3(0, 0, -3.5); // Модуль уходит далеко назад
                } 
                else if (nameLower.includes('_left')) {
                    explodeVec = new THREE.Vector3(-3.5, 0, 0); // Левые крылья/гусеницы уходят влево
                } 
                else if (nameLower.includes('_right')) {
                    explodeVec = new THREE.Vector3(3.5, 0, 0); // Правые крылья/гусеницы уходят вправо
                } 
                else if (nameLower.includes('roller_wheel')) {
                    // Колёса: определяем сторону по мировому положению группы
                    const worldPos = new THREE.Vector3();
                    obj.getWorldPosition(worldPos);
                    // Если группа правее центра — вправо, иначе — влево
                    explodeVec = new THREE.Vector3(worldPos.x >= 0 ? 3.5 : -3.5, 0, 0);
                }

                // Если мы нашли совпадение по имени модуля, сохраняем ИМЕННО ЭТОТ объект (будь то Group или Mesh)
                if (explodeVec) {
                    // Важно: чтобы не дублировать анимацию внутренних элементов, 
                    // мы должны убедиться, что их родитель уже не анимируется.
                    // Но так как traverse идет сверху вниз, мы поймаем верхнюю группу первой!
                    
                    // Проверяем, нет ли уже родителя этого объекта в списке анимации
                    let hasAnimatedParent = false;
                    let parent = obj.parent;
                    while (parent) {
                        if (animatedObjects.some(item => item.obj === parent)) {
                            hasAnimatedParent = true;
                            break;
                        }
                        parent = parent.parent;
                    }

                    if (!hasAnimatedParent) {
                        console.log(`Зарегистрирован модуль в сборе: "${obj.name}" тип: ${obj.type}`);
                        animatedObjects.push({
                            obj: obj,
                            originalPos: obj.position.clone(),
                            explodeVec: explodeVec
                        });
                    }
                }
            });

            console.log(`Итого монолитных модулей готово к разлету: ${animatedObjects.length}`);
            loaderStatus.style.display = 'none';

            container.addEventListener('click', () => {
                isExploded = !isExploded;
                hint.innerText = isExploded ? "СБОРКА МОДУЛЕЙ" : "ДЕТАЛИЗАЦИЯ ПРОТОТИПА";
            });

            function animate() {
                requestAnimationFrame(animate);
                
                // Плавно двигаем ЦЕЛЫЕ группы, все внутренности двигаются за ними автоматически
                for (let i = 0; i < animatedObjects.length; i++) {
                    const item = animatedObjects[i];
                    const target = isExploded 
                        ? item.originalPos.clone().add(item.explodeVec) 
                        : item.originalPos;
                    
                    item.obj.position.lerp(target, 0.07); // Сделал чуть-чуть плавнее (0.07 вместо 0.1)
                }

                // Вращение базы
                if (!isExploded && robotModel) {
                    robotModel.rotation.y += 0.003;
                }
                
                controls.update();
                renderer.render(scene, camera);
            }
            animate();

        }, (xhr) => {
            const p = Math.round(xhr.loaded / xhr.total * 100);
            loaderStatus.innerText = `ЗАГРУЗКА ДАННЫХ: ${p}%`;
        });

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>

    <script>
        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
