<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Робот с сочным освещением и тенями</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a1a; /* Темный фон, чтобы тени и свет смотрелись эффектно */
            font-family: sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        /* Ползунок управления разборкой */
        #slider-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 10;
        }
        #explode-slider {
            width: 250px;
            cursor: pointer;
        }
        #slider-label {
            color: #fff;
            font-size: 14px;
            user-select: none;
            min-width: 45px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="slider-container">
        <span id="slider-label">Сборка:</span>
        <input type="range" id="explode-slider" min="0" max="100" value="0">
        <span id="slider-label" id="slider-value">0%</span>
    </div>

    <div id="canvas-container"></div>

    <script>
        // Основные переменные сцены
        let scene, camera, renderer, controls;
        let robotModel = null;
        
        // Массив для хранения начальных позиций деталей для разборки
        const originalPositions = new Map();
        
        // Целевое значение разборки (куда плавно стремится анимация)
        let targetExplodeFactor = 0;
        let currentExplodeFactor = 0;

        init();
        animate();

        function init() {
            const container = document.getElementById('canvas-container');

            // 1. Создание сцены
            scene = new THREE.Scene();
            // Можно добавить легкий туман для глубины пространства
            scene.fog = new THREE.FogExp2(0x1a1a1a, 0.05);

            // 2. Настройка камеры
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 3, 6);

            // 3. Настройка рендерера с поддержкой ТЕНЕЙ и настроек цвета
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            
            // ВКЛЮЧАЕМ ТЕНИ
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap; // Мягкие размытые тени
            
            // ЦВЕТОКОРРЕКЦИЯ (чтобы модель не была бледной)
            renderer.outputEncoding = THREE.sRGBEncoding;
            
            container.appendChild(renderer.domElement);

            // 4. Интерактивное управление камерой
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 + 0.1; // Не даем камере падать под пол

            // 5. НАСТРОЙКА ОСВЕЩЕНИЯ (Новая сочная схема)
            // Общий мягкий свет окружающей среды
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
            scene.add(ambientLight);

            // Главный направленный свет (создает яркие блики и тени)
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.8);
            dirLight.position.set(6, 12, 8);
            dirLight.castShadow = true; // Этот свет генерирует тени

            // Настройка разрешения карты теней (выше значение = четче тени)
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            dirLight.shadow.camera.near = 0.5;
            dirLight.shadow.camera.far = 30;

            // Границы генерации теней вокруг робота
            const d = 8;
            dirLight.shadow.camera.left = -d;
            dirLight.shadow.camera.right = d;
            dirLight.shadow.camera.top = d;
            dirLight.shadow.camera.bottom = -d;
            dirLight.shadow.bias = -0.0003; // Убирает артефакты полос
            scene.add(dirLight);

            // Мягкий свет снизу, чтобы грани в тени оставались читаемыми
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x333333, 0.5);
            hemiLight.position.set(0, 20, 0);
            scene.add(hemiLight);

            // 6. НЕВИДИМЫЙ ПОЛ ДЛЯ УЛАВЛИВАНИЯ ТЕНЕЙ
            const floorGeo = new THREE.PlaneGeometry(50, 50);
            const floorMat = new THREE.ShadowMaterial({ opacity: 0.4 }); // Ловит только тень, сам прозрачный
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = -1.2; // Отрегулируй, чтобы пол был ровно под ногами робота
            floor.receiveShadow = true; // Принимает тени
            scene.add(floor);

            // 7. Загрузка 3D-модели робота
            const loader = new THREE.GLTFLoader();
            // Укажи здесь правильное имя своего файла модели (например, 'robot.gltf' или 'scene.gltf')
            loader.load('robot.gltf', function (gltf) {
                robotModel = gltf.scene;
                
                // Центрируем модель
                const box = new THREE.Box3().setFromObject(robotModel);
                const center = box.getCenter(new THREE.Vector3());
                robotModel.position.x += (robotModel.position.x - center.x);
                robotModel.position.z += (robotModel.position.z - center.z);

                // Настраиваем тени и материалы для каждой детали робота
                robotModel.traverse(function (child) {
                    if (child.isMesh) {
                        child.castShadow = true;     // Отбрасывает тень
                        child.receiveShadow = true;  // Принимает тени от других деталей

                        // Улучшаем свойства материалов, чтобы убрать бледность
                        if (child.material) {
                            child.material.roughness = 0.35; // Слегка глянцевая поверхность
                            child.material.metalness = 0.3;  // Небольшой металлический отблеск
                        }

                        // Сохраняем начальные позиции для логики взрыва (разборки)
                        originalPositions.set(child, {
                            position: child.position.clone(),
                            // Направление разлёта — от центра детали относительно центра робота
                            direction: child.position.clone().normalize()
                        });
                    }
                });

                scene.add(robotModel);
                console.log("Робот успешно загружен и освещен!");
            }, undefined, function (error) {
                console.error('Ошибка при загрузке модели робота:', error);
            });

            // 8. Слушатель изменения ползунка разборки
            const slider = document.getElementById('explode-slider');
            const sliderValueText = document.getElementById('slider-value');
            
            slider.addEventListener('input', function (e) {
                const val = parseInt(e.target.value);
                if(sliderValueText) sliderValueText.innerText = val + '%';
                // Переводим 0-100% в коэффициент от 0.0 до 1.5 (расстояние разлёта деталей)
                targetExplodeFactor = (val / 100) * 1.5; 
            });

            // Корректное изменение размера окна
            window.addEventListener('resize', onWindowResize, false);
        }

        // Плавное обновление позиций деталей при разборке (Интерполяция Lerp)
        function updateExplosion() {
            if (!robotModel || originalPositions.size === 0) return;

            // Плавно подгоняем текущий фактор к целевому
            currentExplodeFactor += (targetExplodeFactor - currentExplodeFactor) * 0.08;

            // Если разница микроскопическая, фиксируем её
            if (Math.abs(targetExplodeFactor - currentExplodeFactor) < 0.001) {
                currentExplodeFactor = targetExplodeFactor;
            }

            // Двигаем каждую деталь вдоль её вектора направления
            originalPositions.forEach((data, child) => {
                const origPos = data.position;
                const dir = data.direction;
                
                child.position.x = origPos.x + dir.x * currentExplodeFactor;
                child.position.y = origPos.y + dir.y * currentExplodeFactor;
                child.position.z = origPos.z + dir.z * currentExplodeFactor;
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Основной цикл анимации сцены
        function animate() {
            requestAnimationFrame(animate);

            // Обновляем физику плавного разлёта деталей
            updateExplosion();

            // Обновляем вращение камеры пользователем
            controls.update();

            // Рендерим кадр
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
