<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>НРТК СЮРПРИЗ | Главная</title>
    
    <script>
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>

    <style>
        :root {
            --neon-blue: #00f2ff;    
            --dark-blue: #0077ff;    
            --bg-overlay: radial-gradient(circle, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.9) 100%); 
        }

        body {
            background-color: #0a0a0a;
            background-image: url('background.jpg'); 
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            background-size: cover;
            margin: 0;
            padding: 0;
            font-family: 'Verdana', sans-serif;
            color: var(--neon-blue);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-overlay);
            z-index: -1;
        }

        /* --- ШАПКА (БЕЗ ИЗМЕНЕНИЙ) --- */
        .cyber-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid rgba(0, 242, 255, 0.3);
            box-sizing: border-box;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-area { 
            display: flex; 
            align-items: center; 
            text-decoration: none; 
            gap: 20px;
        }

        .logo-img {
            height: 70px;
            width: auto;
            filter: drop-shadow(0 0 10px var(--neon-blue));
        }

        .logo-text-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .nrtk-sub {
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--neon-blue);
            font-weight: bold;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .brand-name {
            font-size: 38px;
            font-weight: 900;
            letter-spacing: 4px;
            color: #fff;
            margin: 0;
            text-transform: uppercase;
            text-shadow: 0 0 15px var(--dark-blue);
            line-height: 1;
        }

        .header-nav { 
            display: flex; 
            align-items: center; 
            gap: 30px;
        }

        .nav-link {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1.5px;
            transition: 0.3s;
            opacity: 0.8;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-link:hover {
            opacity: 1;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .logout-btn {
            border: 1px solid var(--neon-blue);
            color: #fff;
            padding: 10px 20px;
            text-decoration: none;
            font-size: 11px;
            font-weight: bold;
            background: rgba(0, 242, 255, 0.1);
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            transition: 0.3s;
            cursor: pointer;
        }

        .logout-btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 20px var(--neon-blue);
        }

        /* --- 3D КОНТЕЙНЕР --- */
        #canvas-container {
            width: 100%;
            height: 500px; /* Высота области с роботом */
            margin-top: 20px;
            cursor: grab;
        }
        #canvas-container:active { cursor: grabbing; }

        /* --- КОНТЕНТ (ОПУЩЕН ВНИЗ) --- */
        .hero-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 20px 40px 60px 40px;
        }

        .hero-title {
            font-size: clamp(24px, 5vw, 42px);
            font-weight: 900;
            color: #ffffff;
            margin: 0 0 10px 0;
            text-shadow: 0 0 20px var(--neon-blue);
            text-transform: uppercase;
        }

        .hero-text {
            font-size: 16px;
            max-width: 700px;
            line-height: 1.4;
            margin-bottom: 30px;
            color: rgba(0, 242, 255, 0.8);
        }

        .hero-btn {
            display: inline-block;
            padding: 15px 50px;
            color: #fff;
            text-decoration: none;
            border: 2px solid var(--neon-blue);
            font-size: 16px;
            font-weight: bold;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            transition: 0.4s;
        }

        .hero-btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 40px var(--neon-blue);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <header class="cyber-header">
        <a href="index.html" class="logo-area">
            <img src="logo-clean.png" alt="НРТК" class="logo-img">
            <div class="logo-text-block">
                <span class="nrtk-sub">Научно-Робототехнический Комплекс</span>
                <h1 class="brand-name">СЮРПРИЗ</h1>
            </div>
        </a>
        
        <nav class="header-nav">
            <a href="index.html" class="nav-link">ГЛАВНАЯ</a>
            <a href="shop.html" class="nav-link">КАТАЛОГ</a>
            <a href="profile.html" class="nav-link">МОЙ ПРОФИЛЬ</a>
            <a href="cart.html" class="nav-link">КОРЗИНА 🛒</a>
            <a href="#" onclick="logout()" class="logout-btn">ВЫХОД</a>
        </nav>
    </header>

    <div id="canvas-container"></div>

    <main class="hero-section">
        <h2 class="hero-title">ПЕРЕДОВЫЕ ТЕХНОЛОГИИ</h2>
        <p class="hero-text">
            Добро пожаловать в закрытый узел НРТК "СЮРПРИЗ".<br>
            Доступ к прототипам разрешен только авторизованному персоналу.
        </p>
        <a href="shop.html" class="hero-btn">ПЕРЕЙТИ В КАТАЛОГ</a>
    </main>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.129.0/build/three.module.js';
        import { GLTFLoader } from 'https://cdn.skypack.dev/three@0.129.0/examples/jsm/loaders/GLTFLoader.js';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.129.0/examples/jsm/controls/OrbitControls.js';

        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        // Камера
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 1, 5);

        // Рендерер
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Освещение
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const topLight = new THREE.DirectionalLight(0x00f2ff, 1.5);
        topLight.position.set(5, 10, 5);
        scene.add(topLight);

        const blueSideLight = new THREE.PointLight(0x0077ff, 2, 10);
        blueSideLight.position.set(-5, 2, 2);
        scene.add(blueSideLight);

        // Управление мышкой
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.enablePan = false; // Чтобы робот не улетал за экран

        // Загрузка модели
        let robotModel;
        const loader = new GLTFLoader();
        
        loader.load('tank_nrtk.glb', (gltf) => {
            robotModel = gltf.scene;
            
            // Центрируем модель
            const box = new THREE.Box3().setFromObject(robotModel);
            const center = box.getCenter(new THREE.Vector3());
            robotModel.position.sub(center);
            
            scene.add(robotModel);
            
            // Подбираем дистанцию камеры под размер робота
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            camera.position.z = maxDim * 1.5;
            
        }, undefined, (error) => {
            console.error('Ошибка загрузки модели:', error);
        });

        // Анимация
        function animate() {
            requestAnimationFrame(animate);
            if (robotModel) {
                // Медленное вращение для красоты, пока пользователь не трогает
                robotModel.rotation.y += 0.002;
            }
            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        // Адаптивность при изменении размера окна
        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>

    <script>
        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }
    </script>

</body>
</html>
